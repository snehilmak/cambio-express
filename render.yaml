services:
  - type: web
    name: dinerobook
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dinerobook-db
          property: connectionString
      - key: SUPERADMIN_PASSWORD
        value: super2025!   # CHANGE THIS after first deploy
      - key: ADMIN_PASSWORD
        value: cambio2025!  # CHANGE THIS after first deploy
      - key: PYTHON_VERSION
        value: 3.11.0

      # ── Stripe ───────────────────────────────────────────────
      # These are required for billing (subscribe + cancel) and for the
      # new bank-sync flow via Stripe Financial Connections.
      # `sync: false` means Render does NOT use a value from this file —
      # instead it prompts you to enter the secret in the dashboard.
      # Where to find each value:
      #   STRIPE_SECRET_KEY  → Stripe → Developers → API keys → Secret key
      #                         (starts with sk_test_ in test mode, sk_live_ in live)
      #   STRIPE_WEBHOOK_SECRET → Stripe → Developers → Webhooks → your
      #                         endpoint → "Signing secret" (starts whsec_)
      #   STRIPE_BASIC_PRICE_ID / STRIPE_PRO_PRICE_ID → Stripe → Products →
      #                         your plan → Pricing → copy the price ID
      #                         (starts price_)
      #   STRIPE_BASIC_YEARLY_PRICE_ID / STRIPE_PRO_YEARLY_PRICE_ID →
      #                         Stripe → Products → Basic or Pro → add an
      #                         additional price with yearly recurring →
      #                         copy the price ID. Optional: leave blank
      #                         to hide the yearly button on /subscribe.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_BASIC_PRICE_ID
        sync: false
      - key: STRIPE_BASIC_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_PRO_YEARLY_PRICE_ID
        sync: false
      # STRIPE_PUBLISHABLE_KEY → Stripe → Developers → API keys →
      # Publishable key (starts with pk_test_ or pk_live_). Required by
      # the bank-connect page so Stripe.js can open the Financial
      # Connections modal client-side. Pair with STRIPE_SECRET_KEY:
      # pk_test_ goes with sk_test_ and pk_live_ with sk_live_.
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── SMTP for password reset emails ───────────────────────
      # Until these are set, /forgot-password still works — it just logs
      # the reset URL at WARNING level instead of emailing. Gmail + app
      # password is the quickest option:
      #   SMTP_HOST = smtp.gmail.com
      #   SMTP_PORT = 587
      #   SMTP_USER = dinerobook26@gmail.com
      #   SMTP_PASS = <16-char Google App Password, NOT your login>
      #   SMTP_FROM = dinerobook26@gmail.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: dinerobook-db
    plan: free          # upgrade to starter ($7/mo) for production
    databaseName: dinerobook
    user: dinerobook
