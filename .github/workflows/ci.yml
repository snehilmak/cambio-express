name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Syntax + Import + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (catches syntax/indentation errors)
        run: python -m compileall -q .

      - name: Import smoke test (catches runtime import errors)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-secret"
          STRIPE_SECRET_KEY: "sk_test_ci"
          STRIPE_BASIC_PRICE_ID: "price_basic_ci"
          STRIPE_PRO_PRICE_ID: "price_pro_ci"
          STRIPE_WEBHOOK_SECRET: "whsec_ci"
        run: python -c "import app; print('import OK')"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-secret"
          STRIPE_SECRET_KEY: "sk_test_ci"
          STRIPE_BASIC_PRICE_ID: "price_basic_ci"
          STRIPE_PRO_PRICE_ID: "price_pro_ci"
          STRIPE_WEBHOOK_SECRET: "whsec_ci"
        run: pytest -q
