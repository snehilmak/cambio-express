<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Semantic Colors</title></head>
<body><div class="card-wrap">
<div class="swatch-row">
  <div class="swatch"><div class="swatch-chip" style="background:#3fff00"></div><div class="swatch-meta"><div class="swatch-name" style="color:#3fff00">Positive</div><div class="swatch-hex">#3fff00</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#ff4d6d"></div><div class="swatch-meta"><div class="swatch-name" style="color:#ff4d6d">Negative</div><div class="swatch-hex">#ff4d6d</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#ffb020"></div><div class="swatch-meta"><div class="swatch-name" style="color:#ffb020">Warning</div><div class="swatch-hex">#ffb020</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:#5ea9ff"></div><div class="swatch-meta"><div class="swatch-name" style="color:#5ea9ff">Info</div><div class="swatch-hex">#5ea9ff</div></div></div>
</div>
<div class="swatch-row" style="margin-top:10px">
  <div class="swatch"><div class="swatch-chip" style="background:rgba(63,255,0,.10);border:1px solid rgba(63,255,0,.35)"></div><div class="swatch-meta"><div class="swatch-name">Positive BG</div><div class="swatch-hex">α 10%</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:rgba(255,77,109,.10);border:1px solid rgba(255,77,109,.35)"></div><div class="swatch-meta"><div class="swatch-name">Negative BG</div><div class="swatch-hex">α 10%</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:rgba(255,176,32,.10);border:1px solid rgba(255,176,32,.35)"></div><div class="swatch-meta"><div class="swatch-name">Warning BG</div><div class="swatch-hex">α 10%</div></div></div>
  <div class="swatch"><div class="swatch-chip" style="background:rgba(94,169,255,.10);border:1px solid rgba(94,169,255,.35)"></div><div class="swatch-meta"><div class="swatch-name">Info BG</div><div class="swatch-hex">α 10%</div></div></div>
</div></div></body></html>
