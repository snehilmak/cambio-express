<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Badges</title></head>
<body><div class="card-wrap">
<style>
.b{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.3px;font-family:'Inter',sans-serif;border:1px solid transparent}
</style>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <span class="b" style="background:rgba(63,255,0,.12);color:#3fff00;border-color:rgba(63,255,0,.35)">● Sent</span>
  <span class="b" style="background:rgba(255,176,32,.12);color:#ffb020;border-color:rgba(255,176,32,.35)">◷ Pending</span>
  <span class="b" style="background:rgba(255,77,109,.12);color:#ff4d6d;border-color:rgba(255,77,109,.35)">✕ Canceled</span>
  <span class="b" style="background:rgba(255,77,109,.12);color:#ff4d6d;border-color:rgba(255,77,109,.35)">Rejected</span>
  <span class="b" style="background:rgba(255,176,32,.10);color:#c4cad6;border-color:rgba(255,176,32,.25)">Refunded</span>
  <span class="b" style="background:rgba(94,169,255,.12);color:#5ea9ff;border-color:rgba(94,169,255,.35)">Cleared</span>
  <span class="b" style="background:#1c202a;color:#9199a8;border-color:#272c38">Draft</span>
  <span class="b" style="background:#3fff00;color:#001a0f;border-color:#3fff00">PRO</span>
  <span class="b" style="background:transparent;color:#3fff00;border-color:#3fff00;text-transform:uppercase;letter-spacing:1px">Live</span>
</div>
<div style="margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6b7280">Pills · 11/600 · tinted-fill + matching border · dot prefix for state</div>
</div></body></html>
