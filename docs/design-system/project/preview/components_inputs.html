<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Form Inputs</title></head>
<body><div class="card-wrap">
<style>
label{font-size:11px;font-weight:500;color:#9199a8;text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;display:block;margin-bottom:6px}
.inp{padding:11px 14px;border:1px solid #272c38;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#e5e7eb;background:#0e1117;width:100%;box-sizing:border-box;outline:none}
.inp.focus{border-color:#3fff00;box-shadow:0 0 0 3px rgba(63,255,0,.15)}
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div><label>Username</label><input class="inp" value="snehil"></div>
  <div><label>Email (focused)</label><input class="inp focus" value="owner@store.com"></div>
  <div><label>Company</label><select class="inp"><option>Intermex</option></select></div>
  <div><label>Amount</label><input class="inp" value="$1,234.00" style="font-family:'JetBrains Mono',monospace;text-align:right;font-variant-numeric:tabular-nums"></div>
</div>
</div></body></html>
