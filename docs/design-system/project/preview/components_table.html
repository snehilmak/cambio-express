<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Data Table</title></head>
<body><div class="card-wrap" style="padding:16px 20px">
<style>
table{width:100%;border-collapse:collapse;font-size:13px;font-family:'Inter',sans-serif}
thead th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;color:#9199a8;text-transform:uppercase;letter-spacing:1px;background:#0e1117;border-bottom:1px solid #272c38;font-family:'JetBrains Mono',monospace}
tbody td{padding:12px 12px;color:#e5e7eb;border-bottom:1px solid #1c202a;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#161920}
.b{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent}
.m{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
</style>
<table>
<thead><tr><th>Date</th><th>Sender</th><th>Co.</th><th style="text-align:right">Amount</th><th>Status</th></tr></thead>
<tbody>

<tr><td class="m" style="font-size:12px;color:#9199a8">03/14</td><td>Luis Vargas</td><td style="color:#b48cff;font-weight:600">Maxi</td><td class="m" style="text-align:right">$1,200.00</td><td><span class="b" style="background:rgba(255,176,32,.12);color:#ffb020;border-color:rgba(255,176,32,.35)">◷ Pending</span></td></tr>
<tr><td class="m" style="font-size:12px;color:#9199a8">03/13</td><td>Ana Ramirez</td><td style="color:#4dd8e6;font-weight:600">Barri</td><td class="m" style="text-align:right">$85.00</td><td><span class="b" style="background:rgba(63,255,0,.12);color:#3fff00;border-color:rgba(63,255,0,.35)">● Sent</span></td></tr>
</tbody>
</table>
</div></body></html>
