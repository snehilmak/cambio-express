<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Buttons</title></head>
<body><div class="card-wrap">
<style>
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;border:none;text-decoration:none;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:-.01em;transition:all .15s}
.btn-primary{background:#3fff00;color:#001a0f}
.btn-primary:hover{background:#6fff3a;box-shadow:0 0 24px rgba(63,255,0,.4)}
.btn-outline{background:transparent;color:#e5e7eb;border:1px solid #363c4a}
.btn-ghost{background:#1c202a;color:#e5e7eb}
.btn-danger{background:rgba(255,77,109,.15);color:#ff4d6d;border:1px solid rgba(255,77,109,.4)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
</style>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <button class="btn btn-primary">Sign In →</button>
  <button class="btn btn-primary">＋ New Transfer</button>
  <button class="btn btn-ghost">View All</button>
  <button class="btn btn-outline">Cancel</button>
  <button class="btn btn-danger">Delete</button>
  <button class="btn btn-ghost btn-sm">Reset</button>
  <button class="btn btn-primary btn-sm">Apply</button>
</div>
<div style="margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6b7280">.btn-primary (neon) · .btn-ghost · .btn-outline · .btn-danger · .btn-sm</div>
</div></body></html>
