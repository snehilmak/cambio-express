<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Stat Cards</title></head>
<body><div class="card-wrap">
<div style="display:flex;gap:12px">
  <div style="flex:1;background:#11141b;border-radius:16px;border:1px solid #272c38;padding:18px 20px">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#9199a8;text-transform:uppercase;letter-spacing:1.2px;font-weight:500">Total Transfers</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:500;color:#e5e7eb;margin-top:10px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums">1,284</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#3fff00;margin-top:8px;font-variant-numeric:tabular-nums">▲ 12.4% all-time</div>
  </div>
  <div style="flex:1;background:#11141b;border-radius:16px;border:1px solid #272c38;padding:18px 20px">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#9199a8;text-transform:uppercase;letter-spacing:1.2px;font-weight:500">Today</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:500;color:#e5e7eb;margin-top:10px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums">17</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#9199a8;margin-top:8px">Mar 14, 2026</div>
  </div>
  <div style="flex:1;background:#11141b;border-radius:16px;border:1px solid #272c38;padding:18px 20px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 80% 50%,rgba(63,255,0,.10),transparent 60%);pointer-events:none"></div>
    <div style="position:relative;font-family:'JetBrains Mono',monospace;font-size:10px;color:#9199a8;text-transform:uppercase;letter-spacing:1.2px;font-weight:500">Net Income</div>
    <div style="position:relative;font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;color:#3fff00;margin-top:10px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums">+$8,432</div>
    <div style="position:relative;font-family:'JetBrains Mono',monospace;font-size:11px;color:#3fff00;margin-top:8px;font-variant-numeric:tabular-nums">▲ 2.4% March</div>
  </div>
</div></div></body></html>
