<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><title>Banners</title></head>
<body><div class="card-wrap">
<style>
.banner{border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;font-weight:500;border:1px solid transparent;font-family:'Inter',sans-serif;margin-bottom:8px}
.cta{padding:6px 12px;border-radius:8px;font-size:11.5px;font-weight:600;text-decoration:none;letter-spacing:-.01em}
</style>
<div class="banner" style="background:rgba(255,176,32,.08);color:#ffb020;border-color:rgba(255,176,32,.3)">
  <span>Your free trial ends in <strong style="color:#fff">3 days</strong></span>
  <a class="cta" style="background:#ffb020;color:#1a1205">Choose Plan →</a>
</div>
<div class="banner" style="background:rgba(255,77,109,.08);color:#ff4d6d;border-color:rgba(255,77,109,.3)">
  <span>Your free trial has ended. Upgrade to keep full access.</span>
  <a class="cta" style="background:#ff4d6d;color:#1a0509">Upgrade →</a>
</div>
<div class="banner" style="background:rgba(63,255,0,.08);color:#3fff00;border-color:rgba(63,255,0,.3)">
  <span>Daily book saved for Mar 14, 2026.</span>
</div>
</div></body></html>
