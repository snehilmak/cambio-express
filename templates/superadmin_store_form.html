{% extends "base.html" %}
{% block title %}New Store{% endblock %}
{% block page_title %}Add New Store{% endblock %}
{% block content %}
<div style="max-width:600px;">
<div class="card">
  <div class="card-header">
    <span class="card-title">Create a new business account</span>
    <a href="{{ url_for('superadmin_stores') }}" class="btn btn-outline btn-sm">← Back</a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="section-title">Business Info</div>
      <div class="form-grid">
        <div class="field"><label>Business Name *</label><input type="text" name="name" required placeholder="e.g. Cambio Express Austin"></div>
        <div class="field"><label>URL Slug *</label><input type="text" name="slug" required placeholder="e.g. cambio-express-austin"></div>
        <div class="field"><label>Email</label><input type="email" name="email" placeholder="owner@business.com"></div>
        <div class="field"><label>Phone</label><input type="tel" name="phone" placeholder="(512) 555-0000"></div>
        <div class="field span-2"><label>Address</label><input type="text" name="address" placeholder="Full address"></div>
        <div class="field"><label>Plan</label>
          <select name="plan">
            <option value="trial">Trial</option>
            <option value="basic">Basic</option>
            <option value="pro">Pro</option>
          </select>
        </div>
      </div>
      <div class="section-title">Admin Login for This Store</div>
      <div class="form-grid">
        <div class="field"><label>Admin Full Name</label><input type="text" name="admin_name" placeholder="Store Owner Name"></div>
        <div class="field"><label>Admin Username *</label><input type="text" name="admin_username" value="admin" required></div>
        <div class="field"><label>Admin Password *</label><input type="password" name="admin_password" required placeholder="Set a strong password"></div>
      </div>
      <div style="margin-top:24px;display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">Create Store</button>
        <a href="{{ url_for('superadmin_stores') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
