<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — DineroBook</title>
<style>
  /* Offline page is precached by the service worker, so it must NOT
     depend on any external CSS (design-tokens, app.css, etc.) — those
     are also cache-controlled and may not be available when we're
     offline. Keep this page fully self-contained. */
  html, body { margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #0b0d12; color: #e5e7eb;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px; }
  .wrap { max-width: 420px; }
  .mark { width: 56px; height: 56px; margin: 0 auto 18px;
    border-radius: 14px; background: #3fff00;
    display: inline-flex; align-items: center; justify-content: center;
    color: #001a0f; font-family: Georgia, serif; font-weight: 700; font-size: 34px;
    box-shadow: 0 0 24px rgba(63,255,0,0.4); }
  h1 { font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; color: #e5e7eb; margin: 0 0 10px;
    font-weight: 600; letter-spacing: -0.025em; }
  h1 .accent { color: #3fff00; }
  p { font-size: 15px; line-height: 1.6; color: #9199a8; margin: 0 0 24px; }
  button {
    background: #3fff00; color: #001a0f; border: 0; cursor: pointer;
    padding: 13px 26px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; letter-spacing: -0.01em;
    box-shadow: 0 0 0 1px #3fff00, 0 0 24px rgba(63,255,0,0.35);
  }
  button:hover { background: #6fff3a; }
  .sub { margin-top: 18px; font-size: 11px; color: #6b7280;
    font-family: ui-monospace, 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true">$</div>
    <h1>You're <span class="accent">offline.</span></h1>
    <p>DineroBook needs a connection to show live dashboards, transfers, and bank data. Check your Wi-Fi or cellular signal and try again.</p>
    <button onclick="location.reload()">Retry →</button>
    <div class="sub">// Your installed app will resume automatically once you're back online.</div>
  </div>
</body>
</html>
